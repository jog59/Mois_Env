<!DOCTYPE html>
<html lang="fr">
<head>

    <meta charset="UTF-8">
    <title>Mois de l'environnement 2026</title>
    <link rel="icon" type="image/png" sizes="192x192" href="assets/EcoBaboy.png">
    <script src="./js/three.min.js"></script>
    <script src="./js/panolens.min.js"></script>

    <style>
        body {
            margin: 0;
        }

        #viewer {
            position: relative;
            width: 100vw;
            height: 100vh;
        }

        /* Bouton Play/Pause flottant */
        #toggleRotate {
            position: absolute;
            bottom: 20px;
            left: 20px;
            padding: 12px 18px;
            background: rgba(0,0,0,0.6);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            z-index: 20;
        }

        /* Bouton changement image */
        #switchImage {
            position: absolute;
            bottom: 20px;
            left: 160px;
            padding: 12px 18px;
            background: rgba(0,0,0,0.6);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            z-index: 20;
        }


        /* PANEL HORIZONTAL */
        #infoPanel {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 1000px;
            
            max-width: 95vw;
            background: white;
            border-radius: 14px;
            padding: 20px;
            box-shadow: 0 0 35px rgba(0,0,0,0.35);
            display: none;
            z-index: 30;
            font-family: Arial, sans-serif;
        }

        #infoText {
            white-space: pre-line;
        }

        .panel-content {
            display: flex;
            gap: 20px;
        }

        .panel-left {
            flex: 0.4;
        }

        .panel-image {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 10px;
        }

        .panel-right {
            flex: 0.6;
            display: flex;
            flex-direction: column;
        }

        .panel-title {
            margin: 0 0 10px 0;
            font-size: 22px;
            font-weight: bold;
            color: #222;
        }

        .panel-text {
            font-size: 16px;
            line-height: 1.4;
            color: #333;
            margin: 0 0 20px 0;
            flex: 1;
        }

        .panel-logos {
            display: flex;
            gap: 16px;
            margin-top: auto;
        }

        .panel-logo {
            width: 90px;
            height: auto;
        }

        #closePanelBtn {
            position: absolute;
            top: 10px;
            right: 10px;
            background: transparent;
            border: none;
            font-size: 22px;
            cursor: pointer;
            color: #444;
        }
    </style>
</head>

<body>

    <div id="viewer">

        <!-- PANEL D'INFO -->
        <div id="infoPanel">

            <button id="closePanelBtn">✖</button>

            <div class="panel-content">

                <div class="panel-left">
                    <img id="infoImage" src="" class="panel-image">
                </div>

                <div class="panel-right">
                    <h2 id="infoTitle" class="panel-title">Titre</h2>
                    <p id="infoText" class="panel-text">Texte descriptif…</p>

                    <div class="panel-logos">
                        <img src="assets/Challenge4.png" class="panel-logo">
                        <img src="assets/EcoBaboy.png" class="panel-logo">
                    </div>
                </div>

            </div>
        </div>

        <!-- BOUTONS -->
        <button id="toggleRotate">▶️ Rotation</button>
        <button id="switchImage">➡️ Image suivante</button>

    </div>

        <div id="counter" style="
        position:absolute;
        top:20px;
        right:20px;
        background:rgba(0,0,0,0.6);
        color:white;
        padding:10px 16px;
        border-radius:8px;
        font-size:18px;
        z-index:50;
        z-index:999999 !important;

    ">
            Zones trouvées : 0
        </div>


    <script>
        /* --- PANORAMAS --- */
        const pano1 = new PANOLENS.ImagePanorama('assets/image1.jpg');
        const pano2 = new PANOLENS.ImagePanorama('assets/image2.jpg');

        /* --- VIEWER --- */
        const viewer = new PANOLENS.Viewer({
            container: document.querySelector('#viewer'),
            autoRotate: false,
            autoRotateSpeed: 0.3,
            controlBar: true,
            output: 'console'
        });

        viewer.add(pano1);
        viewer.add(pano2);

        /* PANORAMA ACTIF */
        let currentPano = pano1;

        /* --- SWITCH IMAGE --- */
        document.getElementById("switchImage").addEventListener("pointerdown", () => {

            if (currentPano === pano1) {
                currentPano = pano2;
                viewer.setPanorama(pano2);
                deactivateHotspots(hotspotsPano1);
                activateHotspots(hotspotsPano2);
                hideCheckmarks(checkmarksPano1);   // 👈 cacher coches pano1
                showCheckmarks(checkmarksPano2);   // 👈 montrer coches pano2
                switchImage.innerText = "⬅️ Image Précédente";
            } else {
                currentPano = pano1;
                viewer.setPanorama(pano1);
                deactivateHotspots(hotspotsPano2);
                activateHotspots(hotspotsPano1);

                hideCheckmarks(checkmarksPano2);   // 👈 cacher coches pano2
                showCheckmarks(checkmarksPano1);   // 👈 montrer coches pano1

                switchImage.innerText = "➡️ Image suivante";
            }
        });

        /* --- ROTATION AUTO --- */
        let isAutoRotateOn = false;
        let savedRotationState = false;

        function setAutoRotate(state) {
            isAutoRotateOn = state;
            if (viewer.OrbitControls) viewer.OrbitControls.autoRotate = state;
            document.getElementById("toggleRotate").innerText =
                state ? "⏸️ Pause" : "▶️ Rotation";
        }

        document.getElementById("toggleRotate").addEventListener("pointerdown", () => {
            setAutoRotate(!isAutoRotateOn);
        });

        /* --- PANEL FUNCTIONS (GLOBAL !) --- */
        window.showInfoPanel = function (title, text, imageUrl, logos = []) {

            document.getElementById("infoTitle").innerText = title;
            document.getElementById("infoText").innerText = text;
            document.getElementById("infoImage").src = imageUrl;

            // --- LOGOS DYNAMIQUES ---
            const logosContainer = document.querySelector(".panel-logos");
            logosContainer.innerHTML = ""; // on vide

            logos.forEach(src => {
                const img = document.createElement("img");
                img.src = src;
                img.className = "panel-logo";
                logosContainer.appendChild(img);
            });

            document.getElementById("infoPanel").style.display = "block";

            savedRotationState = isAutoRotateOn;
            setAutoRotate(false);
            disableViewerControls();
        };
        window.disableViewerControls = function () {
            if (viewer.OrbitControls) viewer.OrbitControls.enabled = false;
        };

        window.enableViewerControls = function () {
            if (viewer.OrbitControls) viewer.OrbitControls.enabled = true;
        };

        /* Bouton fermer */
        document.getElementById("closePanelBtn").addEventListener("pointerdown", () => {
            document.getElementById("infoPanel").style.display = "none";
            setAutoRotate(savedRotationState);
            enableViewerControls();
        });
    </script>
    <script src="./js/panels.js"></script>
    <script src="./js/detection.js"></script>

</body>
</html>
