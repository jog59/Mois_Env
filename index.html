<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Panolens 360</title>

    <script src="./js/three.min.js"></script>
    <script src="./js/panolens.min.js"></script>

    <style>
        body {
            margin: 0;
        }

        #viewer {
            position: relative;
            width: 100vw;
            height: 100vh;
        }

        /* Bouton Play/Pause flottant */
        #toggleRotate {
            position: absolute;
            bottom: 20px;
            left: 20px;
            padding: 12px 18px;
            background: rgba(0,0,0,0.6);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            z-index: 20;
        }

        /* PANEL HORIZONTAL */
        #infoPanel {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 780px;
            max-width: 95vw;
            background: white;
            border-radius: 14px;
            padding: 20px;
            box-shadow: 0 0 35px rgba(0,0,0,0.35);
            display: none;
            z-index: 30;
            font-family: Arial, sans-serif;
        }

        /* Contenu en 2 colonnes */
        .panel-content {
            display: flex;
            gap: 20px;
        }

        /* Colonne gauche : image */
        .panel-left {
            flex: 1.2;
        }

        .panel-image {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 10px;
        }

        /* Colonne droite */
        .panel-right {
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        .panel-title {
            margin: 0 0 10px 0;
            font-size: 22px;
            font-weight: bold;
            color: #222;
        }

        .panel-text {
            font-size: 16px;
            line-height: 1.4;
            color: #333;
            margin: 0 0 20px 0;
            flex: 1;
        }

        /* Logos */
        .panel-logos {
            display: flex;
            gap: 16px;
            margin-top: auto;
        }

        .panel-logo {
            width: 90px;
            height: auto;
        }

        /* Bouton fermer */
        #closePanelBtn {
            position: absolute;
            top: 10px;
            right: 10px;
            background: transparent;
            border: none;
            font-size: 22px;
            cursor: pointer;
            color: #444;
        }
    </style>
</head>

<body>

    <!-- VIEWER + UI -->
    <div id="viewer">

        <!-- PANEL D'INFO -->
        <div id="infoPanel">

            <button id="closePanelBtn">✖</button>

            <div class="panel-content">

                <!-- Image -->
                <div class="panel-left">
                    <img id="infoImage" src="" class="panel-image">
                </div>

                <!-- Texte + logos -->
                <div class="panel-right">
                    <h2 id="infoTitle" class="panel-title">Titre</h2>
                    <p id="infoText" class="panel-text">Texte descriptif…</p>

                    <div class="panel-logos">
                        <img src="assets/Challenge4.png" class="panel-logo">
                        <img src="assets/EcoBaboy.png" class="panel-logo">
                    </div>
                </div>

            </div>
        </div>

        <!-- BOUTON PLAY/PAUSE -->
        <button id="toggleRotate">▶️ Rotation</button>

    </div>

    <script>
        /* --- PANORAMA --- */
        const panorama = new PANOLENS.ImagePanorama('assets/image1.jpg');

        /* --- VIEWER --- */
        const viewer = new PANOLENS.Viewer({
            container: document.querySelector('#viewer'),
            autoRotate: false,
            autoRotateSpeed: 0.3,
            controlBar: true,
            output: 'console'
        });

        viewer.add(panorama);

        /* --- GESTION AUTO-ROTATE --- */
        let isAutoRotateOn = false;
        let savedRotationState = false;

        function setAutoRotate(state) {
            isAutoRotateOn = state;
            if (viewer.OrbitControls) {
                viewer.OrbitControls.autoRotate = state;
            }
            document.getElementById("toggleRotate").innerText =
                state ? "⏸️ Pause" : "▶️ Rotation";
        }

        document.getElementById("toggleRotate").addEventListener("click", () => {
            setAutoRotate(!isAutoRotateOn);
        });

        document.getElementById("closePanelBtn").addEventListener("click", () => {
            document.getElementById("infoPanel").style.display = "none";
            setAutoRotate(savedRotationState);
            enableViewerControls();
        });
    </script>

    <script src="./js/detection.js"></script>

</body>
</html>
